version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nilerr
    - bodyclose
    - prealloc
  settings:
    govet:
      disable:
        - fieldalignment
        - shadow
    gocritic:
      enabled-tags:
        - diagnostic
        - performance

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/irbgeo/irregular-verbs-tgbot 

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
